---
layout: default
---

<div id="site">
  {% include switch.html %}
  
  <article class="post-content">
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }} • {{ page.description }}</p>
    </header>

    <div class="post-body">
      {{ content }}
    </div>

    <footer class="post-footer">
      <a href="{{ site.baseurl }}/" class="arrow-link">Back to Home</a>
    </footer>
  </article>

  {% include footer.html %}
  {% include top-button.html %}
</div>
