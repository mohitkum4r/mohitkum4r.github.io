<section class="section writing">
  <div class="section__title">Writing</div>
  <div class="section__content">
      <div class="posts">
        {% for post in site.posts limit:2 %}
        <div class="post-item" style="margin-bottom: 40px;">
          <div class="post-item__meta" style="font-family: 'Inconsolata', monospace; font-size: 0.85rem; opacity: 0.6; letter-spacing: 1px; margin-bottom: 8px;">{{ post.date | date: "%b %-d, %Y" }}</div>
          <div class="post-item__title" style="font-size: 1.6rem; font-weight: 700; line-height: 1.3; margin-bottom: 10px;">
            <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
          </div>
          <div class="post-item__description" style="font-size: 1.1rem; line-height: 1.5; font-weight: 300; opacity: 0.8;">
            {{ post.description }}
          </div>
        </div>
        {% endfor %}
      </div>
      {% if site.posts.size > 0 %}
      <div style="margin-top: 40px;">
        <a href="{{ site.baseurl }}/blog/" class="arrow-link" style="font-weight: 600; font-size: 1.1rem; text-decoration: none;">View all writing</a>
      </div>
      {% endif %}
  </div>
</section>
